<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#ffffff"/>
  <!-- Grass base -->
  <rect x="8" y="76" width="84" height="8" rx="4" fill="#2e7d32"/>
  <!-- Left stalk -->
  <rect x="30" y="42" width="5" height="35" rx="2.5" fill="#388e3c"/>
  <!-- Right stalk -->
  <rect x="65" y="42" width="5" height="35" rx="2.5" fill="#388e3c"/>
  <!-- Left flower: 6 petals at 60° each -->
  <ellipse cx="32.5" cy="24" rx="5" ry="13" fill="#1b5e20"/>
  <ellipse cx="32.5" cy="24" rx="5" ry="13" fill="#2e7d32" transform="rotate(60,32.5,24)"/>
  <ellipse cx="32.5" cy="24" rx="5" ry="13" fill="#1b5e20" transform="rotate(120,32.5,24)"/>
  <ellipse cx="32.5" cy="24" rx="5" ry="13" fill="#2e7d32" transform="rotate(180,32.5,24)"/>
  <ellipse cx="32.5" cy="24" rx="5" ry="13" fill="#1b5e20" transform="rotate(240,32.5,24)"/>
  <ellipse cx="32.5" cy="24" rx="5" ry="13" fill="#2e7d32" transform="rotate(300,32.5,24)"/>
  <circle cx="32.5" cy="24" r="7" fill="#fdd835"/>
  <circle cx="32.5" cy="24" r="4" fill="#f9a825"/>
  <!-- Right flower: 6 petals at 60° each -->
  <ellipse cx="67.5" cy="24" rx="5" ry="13" fill="#1b5e20"/>
  <ellipse cx="67.5" cy="24" rx="5" ry="13" fill="#2e7d32" transform="rotate(60,67.5,24)"/>
  <ellipse cx="67.5" cy="24" rx="5" ry="13" fill="#1b5e20" transform="rotate(120,67.5,24)"/>
  <ellipse cx="67.5" cy="24" rx="5" ry="13" fill="#2e7d32" transform="rotate(180,67.5,24)"/>
  <ellipse cx="67.5" cy="24" rx="5" ry="13" fill="#1b5e20" transform="rotate(240,67.5,24)"/>
  <ellipse cx="67.5" cy="24" rx="5" ry="13" fill="#2e7d32" transform="rotate(300,67.5,24)"/>
  <circle cx="67.5" cy="24" r="7" fill="#fdd835"/>
  <circle cx="67.5" cy="24" r="4" fill="#f9a825"/>
</svg>
