<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- TMC / AITC symbol: two flowers on grass stalks (joda phool) -->
  <rect width="100" height="100" fill="#ffffff"/>
  <!-- Grass base -->
  <rect x="10" y="82" width="80" height="5" rx="2" fill="#2e7d32"/>
  <!-- Left stalk -->
  <line x1="32" y1="82" x2="32" y2="50" stroke="#2e7d32" stroke-width="3" stroke-linecap="round"/>
  <!-- Right stalk -->
  <line x1="68" y1="82" x2="68" y2="50" stroke="#2e7d32" stroke-width="3" stroke-linecap="round"/>
  <!-- Left flower petals -->
  <ellipse cx="32" cy="40" rx="8" ry="5" fill="#1b5e20" transform="rotate(-60 32 40)"/>
  <ellipse cx="32" cy="40" rx="8" ry="5" fill="#2e7d32" transform="rotate(0 32 40)"/>
  <ellipse cx="32" cy="40" rx="8" ry="5" fill="#1b5e20" transform="rotate(60 32 40)"/>
  <ellipse cx="32" cy="40" rx="8" ry="5" fill="#2e7d32" transform="rotate(120 32 40)"/>
  <ellipse cx="32" cy="40" rx="8" ry="5" fill="#1b5e20" transform="rotate(-120 32 40)"/>
  <!-- Left flower centre -->
  <circle cx="32" cy="40" r="5" fill="#fdd835"/>
  <!-- Right flower petals -->
  <ellipse cx="68" cy="40" rx="8" ry="5" fill="#1b5e20" transform="rotate(-60 68 40)"/>
  <ellipse cx="68" cy="40" rx="8" ry="5" fill="#2e7d32" transform="rotate(0 68 40)"/>
  <ellipse cx="68" cy="40" rx="8" ry="5" fill="#1b5e20" transform="rotate(60 68 40)"/>
  <ellipse cx="68" cy="40" rx="8" ry="5" fill="#2e7d32" transform="rotate(120 68 40)"/>
  <ellipse cx="68" cy="40" rx="8" ry="5" fill="#1b5e20" transform="rotate(-120 68 40)"/>
  <!-- Right flower centre -->
  <circle cx="68" cy="40" r="5" fill="#fdd835"/>
</svg>
